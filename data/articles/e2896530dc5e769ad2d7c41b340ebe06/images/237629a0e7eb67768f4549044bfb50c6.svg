  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
   <defs>
    <linearGradient x1="0%" y1="0%" x2="100%" y2="100%">
     <stop offset="0%" style="stop-color:#1e293b">
     </stop>
     <stop offset="100%" style="stop-color:#0f172a">
     </stop>
    </linearGradient>
    <marker markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
     <path d="M0,0 L0,6 L9,3 z" fill="#ef4444">
     </path>
    </marker>
    <marker markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
     <path d="M0,0 L0,6 L9,3 z" fill="#64748b">
     </path>
    </marker>
   </defs>
   <rect width="800" height="400" fill="url(#bgGrad)">
   </rect>
   <text x="400" y="35" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#f8fafc" text-anchor="middle">
    
    
    
    The Stale Closure Problem
   </text>
   <line x1="50" y1="350" x2="750" y2="350" stroke="#475569" stroke-width="2">
   </line>
   <text x="400" y="385" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    
    
    
    Time
   </text>
   <g transform="translate(120, 80)">
    <rect x="-60" y="0" width="120" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2">
    </rect>
    <text x="0" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#60a5fa" text-anchor="middle">
     
     
     
     Render 1
    </text>
    <text x="0" y="50" font-family="Monaco, monospace" font-size="11" fill="#94a3b8" text-anchor="middle">
     
     
     
     count = 0
    </text>
    <text x="0" y="68" font-family="Monaco, monospace" font-size="10" fill="#64748b" text-anchor="middle">
     
     
     
     (initial)
    </text>
   </g>
   <g transform="translate(120, 180)">
    <rect x="-70" y="0" width="140" height="100" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2">
    </rect>
    <text x="0" y="22" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#fbbf24" text-anchor="middle">
     
     
     
     Effect Created
    </text>
    <text x="0" y="42" font-family="Monaco, monospace" font-size="10" fill="#94a3b8" text-anchor="middle">
     
     
     
     callback captures
    </text>
    <rect x="-50" y="50" width="100" height="28" rx="4" fill="#dc2626">
    </rect>
    <text x="0" y="69" font-family="Monaco, monospace" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">
     
     
     
     count = 0
    </text>
    <text x="0" y="92" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">
     
     
     
     FROZEN FOREVER!
    </text>
   </g>
   <line x1="120" y1="160" x2="120" y2="175" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)">
   </line>
   <g transform="translate(300, 80)">
    <rect x="-60" y="0" width="120" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2">
    </rect>
    <text x="0" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#60a5fa" text-anchor="middle">
     
     
     
     Render 2
    </text>
    <text x="0" y="50" font-family="Monaco, monospace" font-size="11" fill="#4ade80" text-anchor="middle">
     
     
     
     count = 1
    </text>
    <text x="0" y="68" font-family="Monaco, monospace" font-size="10" fill="#64748b" text-anchor="middle">
     
     
     
     (updated)
    </text>
   </g>
   <g transform="translate(480, 80)">
    <rect x="-60" y="0" width="120" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2">
    </rect>
    <text x="0" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#60a5fa" text-anchor="middle">
     
     
     
     Render 3
    </text>
    <text x="0" y="50" font-family="Monaco, monospace" font-size="11" fill="#4ade80" text-anchor="middle">
     
     
     
     count = 5
    </text>
    <text x="0" y="68" font-family="Monaco, monospace" font-size="10" fill="#64748b" text-anchor="middle">
     
     
     
     (updated)
    </text>
   </g>
   <g transform="translate(660, 180)">
    <rect x="-70" y="0" width="140" height="100" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2">
    </rect>
    <text x="0" y="22" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#f87171" text-anchor="middle">
     
     
     
     Callback Called
    </text>
    <text x="0" y="42" font-family="Monaco, monospace" font-size="10" fill="#94a3b8" text-anchor="middle">
     
     
     
     still sees
    </text>
    <rect x="-50" y="50" width="100" height="28" rx="4" fill="#dc2626">
    </rect>
    <text x="0" y="69" font-family="Monaco, monospace" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">
     
     
     
     count = 0
    </text>
    <text x="0" y="92" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">
     
     
     
     STALE!
    </text>
   </g>
   <path d="M 190 230 Q 400 320 590 230" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4" fill="none" marker-end="url(#arrowRed)">
   </path>
   <text x="400" y="310" font-family="system-ui, sans-serif" font-size="11" fill="#f87171" text-anchor="middle">
    
    
    
    Closure still references Render 1's value
   </text>
   <circle cx="120" cy="350" r="6" fill="#3b82f6">
   </circle>
   <circle cx="300" cy="350" r="6" fill="#3b82f6">
   </circle>
   <circle cx="480" cy="350" r="6" fill="#3b82f6">
   </circle>
   <circle cx="660" cy="350" r="6" fill="#ef4444">
   </circle>
   <text x="120" y="340" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
    
    
    
    mount
   </text>
   <text x="300" y="340" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
    
    
    
    click
   </text>
   <text x="480" y="340" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
    
    
    
    click x4
   </text>
   <text x="660" y="340" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">
    
    
    
    event fires
   </text>
  </svg>
